version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nestdb_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nestuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nestpassword}
      POSTGRES_DB: ${POSTGRES_DB:-nestdb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: payload_api
    ports:
      - "3000:3000"
    environment:
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-super-secret-key-change-in-production}
      DATABASE_URI: postgresql://${POSTGRES_USER:-nestuser}:${POSTGRES_PASSWORD:-nestpassword}@db:5432/${POSTGRES_DB:-nestdb}
      PORT: 3000
      NODE_ENV: development
    depends_on:
      - db
    restart: always

volumes:
  pgdata: